<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inventario Cloud | FarmaSalud</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <script>
        tailwind.config = { theme: { extend: { colors: { farmaGreen: '#8DC63F', farmaPurple: '#752888', farmaDarkPurple: '#561c65' } } } }
    </script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; overflow-x: hidden; touch-action: pan-y; background-color: #f4f7f6; }
        input[type="number"] { font-size: 16px; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .loader { border: 4px solid #e5e7eb; border-top: 4px solid #752888; border-radius: 50%; width: 25px; height: 25px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .texto-ajustable { word-wrap: break-word; overflow-wrap: break-word; white-space: normal; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <header class="bg-farmaPurple shadow-lg sticky top-0 z-50 text-white">
        <!-- Barra Superior con Cambio de Pestañas -->
        <div class="px-4 py-3 flex flex-col md:flex-row justify-between items-center max-w-7xl mx-auto w-full gap-3">
            <div class="flex items-center gap-3 w-full md:w-auto justify-center md:justify-start">
                <i class="fa-solid fa-cloud text-3xl text-farmaGreen"></i>
                <div class="leading-none">
                    <h1 class="text-xl md:text-2xl font-bold tracking-wide">Inventario <span class="font-light">Nube</span></h1>
                    <span class="text-xs text-farmaGreen font-bold tracking-wider uppercase">FarmaSalud Contulmo</span>
                </div>
            </div>
            
            <div class="flex gap-1 bg-purple-900/50 p-1 rounded-xl w-full md:w-auto justify-center">
                <button onclick="switchTab('inventario')" id="tab-inventario" class="flex-1 md:flex-none px-4 py-2 rounded-lg bg-farmaGreen text-white font-bold text-sm shadow transition">
                    <i class="fa-solid fa-boxes-stacked mr-1"></i> Contar
                </button>
                <button onclick="switchTab('historial')" id="tab-historial" class="flex-1 md:flex-none px-4 py-2 rounded-lg text-purple-200 hover:text-white hover:bg-white/10 font-bold text-sm transition">
                    <i class="fa-solid fa-clock-rotate-left mr-1"></i> Historial
                </button>
            </div>
        </div>
    </header>

    <main class="flex-grow w-full max-w-7xl mx-auto px-4 py-6">
        
        <!-- ============================== -->
        <!-- PESTAÑA 1: INVENTARIO DIARIO -->
        <!-- ============================== -->
        <div id="view-inventario">
            <!-- Barra de Herramientas -->
            <div class="flex flex-col lg:flex-row justify-between gap-3 bg-white p-4 rounded-2xl shadow-sm border border-gray-100 mb-6">
                <div class="relative flex-1">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-gray-400 text-lg"></i>
                    <input type="text" id="searchInput" class="w-full py-3 pl-12 pr-4 rounded-xl bg-gray-50 border border-gray-200 text-gray-800 outline-none font-medium text-base md:text-lg focus:border-farmaPurple transition" placeholder="Escribe para buscar y contar..." autocomplete="off" disabled>
                </div>
                <div class="flex gap-2">
                    <button id="btn-exportar" onclick="guardarAuditoria()" class="flex-1 lg:flex-none bg-blue-600 hover:bg-blue-500 px-5 py-3 rounded-xl text-white font-bold transition shadow-sm flex items-center justify-center gap-2 whitespace-nowrap">
                        <i class="fa-solid fa-cloud-arrow-up"></i> Guardar Reporte
                    </button>
                    <button onclick="resetInventarioNube()" class="bg-red-50 text-red-600 hover:bg-red-100 px-4 py-3 rounded-xl font-bold transition shadow-sm flex items-center justify-center border border-red-200" title="Borrar todo el conteo">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                </div>
            </div>

            <div class="flex gap-2 mb-6 overflow-x-auto pb-1 no-scrollbar">
                <button onclick="setFilter('todos')" id="btn-todos" class="filter-btn bg-farmaGreen text-white px-4 py-1.5 rounded-full text-sm font-bold whitespace-nowrap shadow-sm transition">Todos</button>
                <button onclick="setFilter('diferencias')" id="btn-diferencias" class="filter-btn bg-white text-gray-600 border border-gray-200 px-4 py-1.5 rounded-full text-sm font-bold whitespace-nowrap hover:bg-gray-50 transition">Con Diferencia</button>
                <button onclick="setFilter('pendientes')" id="btn-pendientes" class="filter-btn bg-white text-gray-600 border border-gray-200 px-4 py-1.5 rounded-full text-sm font-bold whitespace-nowrap hover:bg-gray-50 transition">Sin Contar</button>
            </div>

            <div id="statusContainer" class="flex flex-col items-center justify-center text-gray-500 my-16 gap-3">
                <div class="loader"></div>
                <span class="font-semibold text-base text-farmaPurple">Sincronizando Maestro y Nube...</span>
            </div>

            <div class="text-sm text-gray-600 font-bold bg-white px-4 py-2 rounded-lg shadow-sm border border-gray-100 mb-4 inline-block" id="resultsCount"></div>

            <div id="productsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
            <div id="pagination" class="flex justify-center items-center gap-2 mt-10 mb-8 flex-wrap"></div>
        </div>

        <!-- ============================== -->
        <!-- PESTAÑA 2: HISTORIAL EN NUBE  -->
        <!-- ============================== -->
        <div id="view-historial" class="hidden">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 md:p-6">
                <h2 class="text-xl font-bold text-gray-800 mb-2"><i class="fa-solid fa-folder-open text-farmaPurple mr-2"></i> Reportes Guardados</h2>
                <p class="text-gray-500 text-sm mb-6">Aquí quedan registradas las "fotografías" del stock y las diferencias cada vez que cierras un inventario (Botón Guardar Reporte).</p>
                
                <div id="historial-loader" class="flex items-center gap-3 text-farmaPurple font-bold hidden mb-6">
                    <div class="loader"></div> Leyendo datos de la nube...
                </div>
                
                <div id="historial-list" class="flex flex-col gap-3">
                    <!-- Cards de historial -->
                </div>
            </div>
        </div>
    </main>

    <script>
        // ==========================================
        const URL_CSV_MAESTRO = "https://docs.google.com/spreadsheets/d/1GjVV8vuErPNmOIVkP-pk6VPiTrlf4IQby2v-OS0J3Zg/export?format=csv&gid=1307499139";
        const URL_APPS_SCRIPT = "https://script.google.com/macros/s/AKfycbxzR2WbNUe4-PB6pZOI5hZTPaX8YouVrAabWnVGQ5CypPjB_EgwbF_QwoFYCNYOnAjgeg/exec";
        // ==========================================

        let allProducts = [];
        let filteredProducts = [];
        let physicalStockMap = {}; 
        let historialesGuardados = [];
        let currentFilter = 'todos';
        let debounceTimers = {};
        let currentPage = 1;
        const itemsPerPage = 24;

        const clpFmt = new Intl.NumberFormat('es-CL', { style: 'currency', currency: 'CLP', minimumFractionDigits: 0 });

        window.onload = () => {
            document.getElementById('searchInput').addEventListener('input', () => { currentPage = 1; applyFilters(); });

            const fetchCSV = new Promise((resolve) => { Papa.parse(URL_CSV_MAESTRO, { download: true, header: false, complete: res => resolve(res.data) }); });
            const fetchNube = fetch(`${URL_APPS_SCRIPT}?action=get`).then(res => res.json()).catch(() => ({}));

            Promise.all([fetchCSV, fetchNube]).then(values => {
                physicalStockMap = values[1];
                procesarDatosMaestro(values[0]);
            });
        };

        // ====== CONTROL DE PESTAÑAS ======
        window.switchTab = function(tabName) {
            if(tabName === 'inventario') {
                document.getElementById('view-inventario').classList.remove('hidden');
                document.getElementById('view-historial').classList.add('hidden');
                
                document.getElementById('tab-inventario').className = "flex-1 md:flex-none px-4 py-2 rounded-lg bg-farmaGreen text-white font-bold text-sm shadow transition";
                document.getElementById('tab-historial').className = "flex-1 md:flex-none px-4 py-2 rounded-lg text-purple-200 hover:text-white hover:bg-white/10 font-bold text-sm transition";
            } else {
                document.getElementById('view-inventario').classList.add('hidden');
                document.getElementById('view-historial').classList.remove('hidden');
                
                document.getElementById('tab-inventario').className = "flex-1 md:flex-none px-4 py-2 rounded-lg text-purple-200 hover:text-white hover:bg-white/10 font-bold text-sm transition";
                document.getElementById('tab-historial').className = "flex-1 md:flex-none px-4 py-2 rounded-lg bg-farmaGreen text-white font-bold text-sm shadow transition";
                
                cargarHistorial();
            }
        };

        // ====== LÓGICA DE INVENTARIO ======
        function procesarDatosMaestro(rawData) {
            let tempProducts = [];
            let headerRowIndex = -1; 
            for (let i = 0; i < Math.min(20, rawData.length); i++) {
                if (rawData[i].includes("LAB") && rawData[i].includes("DETALLE")) { headerRowIndex = i; break; }
            }
            if(headerRowIndex === -1) headerRowIndex = 5;

            for (let i = headerRowIndex + 1; i < rawData.length; i++) {
                const row = rawData[i];
                if (!row || row.length < 8) continue;
                let precioStr = typeof row[7] === 'string' ? row[7].replace(/[^0-9]/g, '') : row[7];
                if (row[4] && precioStr && !isNaN(parseInt(precioStr))) {
                    tempProducts.push({
                        id: btoa(unescape(encodeURIComponent(String(row[4]).trim()))).substring(0, 20),
                        lab: row[0] || 'S/L',
                        nombre: String(row[4]).trim(),
                        precio: parseInt(precioStr),
                        stockSistema: parseInt(row[10]) || 0
                    });
                }
            }
            allProducts = tempProducts;
            document.getElementById('statusContainer').style.display = 'none';
            document.getElementById('searchInput').disabled = false;
            applyFilters();
        }

        function setFilter(type) {
            currentFilter = type; currentPage = 1;
            document.querySelectorAll('.filter-btn').forEach(btn => { btn.className = "filter-btn bg-white text-gray-600 border border-gray-200 px-4 py-1.5 rounded-full text-sm font-bold whitespace-nowrap hover:bg-gray-50 transition"; });
            document.getElementById(`btn-${type}`).className = "filter-btn bg-farmaGreen text-white px-4 py-1.5 rounded-full text-sm font-bold whitespace-nowrap shadow-sm transition";
            applyFilters();
        }

        function applyFilters() {
            const terms = document.getElementById('searchInput').value.toLowerCase().trim().split(' ');
            filteredProducts = allProducts.filter(p => {
                const searchable = `${p.nombre} ${p.lab}`.toLowerCase();
                if(!terms.every(t => searchable.includes(t))) return false;
                const fisico = physicalStockMap[p.id];
                if (currentFilter === 'diferencias') return fisico !== undefined && parseInt(fisico) !== p.stockSistema;
                if (currentFilter === 'pendientes') return fisico === undefined || fisico === "";
                return true; 
            });
            renderPage();
        }

        function renderPage() {
            const grid = document.getElementById('productsGrid');
            const totalItems = filteredProducts.length;
            const totalPages = Math.ceil(totalItems / itemsPerPage);
            
            document.getElementById('resultsCount').innerHTML = `<i class="fa-solid fa-list text-farmaPurple mr-2"></i> ${totalItems} resultados (Usa el buscador)`;
            grid.innerHTML = '';

            if (totalItems === 0) {
                grid.innerHTML = `<div class="col-span-full py-16 text-center text-gray-400 bg-white rounded-2xl shadow-sm"><i class="fa-solid fa-box-open text-5xl mb-4 text-gray-300"></i><p class="text-lg">No hay productos que coincidan.</p></div>`;
                document.getElementById('pagination').innerHTML = ''; return;
            }

            const currentItems = filteredProducts.slice((currentPage - 1) * itemsPerPage, (currentPage - 1) * itemsPerPage + itemsPerPage);

            currentItems.forEach(item => {
                let fisicoVal = physicalStockMap[item.id] !== undefined ? physicalStockMap[item.id] : "";
                const card = document.createElement('div');
                card.className = `bg-white rounded-2xl p-4 shadow-[0_2px_10px_-3px_rgba(6,81,237,0.1)] border-t-4 ${fisicoVal !== "" ? 'border-farmaGreen' : 'border-gray-200'} flex flex-col h-full`;
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <div class="text-[10px] font-black text-gray-400 uppercase tracking-wider bg-gray-50 px-2 py-0.5 rounded">${item.lab}</div>
                        <i id="cloud_${item.id}" class="fa-solid fa-cloud text-gray-200 text-sm"></i>
                    </div>
                    <h3 class="text-sm md:text-base font-bold text-gray-800 mb-4 leading-snug texto-ajustable flex-grow">${item.nombre}</h3>
                    <div class="flex items-center justify-between bg-gray-50 rounded-xl p-2 md:p-3 border border-gray-100">
                        <div class="text-center flex-1">
                            <span class="block text-[10px] text-gray-500 uppercase font-bold mb-1">Sistema</span>
                            <span class="text-lg font-black text-gray-700">${item.stockSistema}</span>
                        </div>
                        <div class="text-center flex-1">
                            <span class="block text-[10px] text-farmaPurple uppercase font-bold mb-1">Físico</span>
                            <input type="number" value="${fisicoVal}" oninput="handleStockInput('${item.id}', ${item.stockSistema}, this.value)"
                                class="w-14 h-8 text-center font-bold text-lg border-2 border-farmaPurple rounded-lg focus:ring-2 focus:ring-farmaGreen outline-none shadow-sm">
                        </div>
                        <div class="text-center flex-1">
                            <span class="block text-[10px] text-gray-500 uppercase font-bold mb-1">Dif.</span>
                            <div id="diff_${item.id}" class="px-2 py-0.5 rounded text-sm font-black">-</div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
                actualizarVisualDiferencia(item.id, item.stockSistema, fisicoVal);
            });
            renderPagination(totalPages);
        }

        window.handleStockInput = function(id, stockSistema, val) {
            actualizarVisualDiferencia(id, stockSistema, val);
            if(val === "") delete physicalStockMap[id]; else physicalStockMap[id] = parseInt(val);

            document.getElementById('cloud_' + id).className = "fa-solid fa-cloud text-yellow-400 text-sm";
            if (debounceTimers[id]) clearTimeout(debounceTimers[id]);
            debounceTimers[id] = setTimeout(() => {
                fetch(`${URL_APPS_SCRIPT}?action=update&id=${encodeURIComponent(id)}&qty=${val}`)
                .then(() => { document.getElementById('cloud_' + id).className = "fa-solid fa-cloud text-farmaGreen text-sm"; })
                .catch(() => { document.getElementById('cloud_' + id).className = "fa-solid fa-cloud text-red-500 text-sm"; });
            }, 800);
        };

        function actualizarVisualDiferencia(id, stockSistema, val) {
            let dEl = document.getElementById('diff_' + id); if(!dEl) return;
            if (val === "") { dEl.innerHTML = "-"; dEl.className = "px-2 py-0.5 rounded text-sm font-black text-gray-400"; return; }
            let dif = parseInt(val) - stockSistema;
            if (dif === 0) { dEl.innerHTML = "<i class='fa-solid fa-check'></i>"; dEl.className = "px-2 py-0.5 rounded text-sm font-black text-green-600 bg-green-100"; }
            else if (dif > 0) { dEl.innerHTML = "+" + dif; dEl.className = "px-2 py-0.5 rounded text-sm font-black text-blue-600 bg-blue-100"; }
            else { dEl.innerHTML = dif; dEl.className = "px-2 py-0.5 rounded text-sm font-black text-red-600 bg-red-100"; }
        }

        function renderPagination(totalPages) {
            const container = document.getElementById('pagination'); container.innerHTML = '';
            if (totalPages <= 1) return;
            const createBtn = (html, disabled, onClick) => {
                const b = document.createElement('button'); b.innerHTML = html; b.disabled = disabled; b.onclick = onClick;
                b.className = `w-10 h-10 rounded-xl flex items-center justify-center border-2 font-bold mx-1 transition ${disabled ? 'text-gray-300 border-gray-200 cursor-not-allowed bg-white' : 'text-farmaPurple border-farmaPurple hover:bg-farmaPurple hover:text-white bg-white'}`;
                return b;
            };
            container.appendChild(createBtn('<i class="fa-solid fa-chevron-left"></i>', currentPage === 1, () => { currentPage--; renderPage(); window.scrollTo(0, 0); }));
            const info = document.createElement('span'); info.className = "text-sm font-bold text-gray-600 px-4 bg-white py-2 rounded-xl border border-gray-200 shadow-sm"; info.innerText = `Pág ${currentPage} de ${totalPages}`; container.appendChild(info);
            container.appendChild(createBtn('<i class="fa-solid fa-chevron-right"></i>', currentPage === totalPages, () => { currentPage++; renderPage(); window.scrollTo(0, 0); }));
        }

// ====== HISTORIAL Y EXPORTACIÓN (CORREGIDO PARA EXCEL EN ESPAÑOL) ======
        window.guardarAuditoria = function() {
            // Filtro mejorado para evitar errores NaN
            const diferencias = allProducts.filter(p => {
                const fisico = physicalStockMap[p.id];
                return fisico !== undefined && fisico !== "" && !isNaN(parseInt(fisico)) && parseInt(fisico) !== p.stockSistema;
            });

            if (diferencias.length === 0) { 
                alert("No hay diferencias reportadas para guardar ni exportar."); 
                return; 
            }

            const ahora = new Date();
            const fechaHoraFormateada = ahora.toLocaleString('es-CL');
            const idAuditoria = ahora.getTime().toString();
            const btn = document.getElementById('btn-exportar');
            
            const payloadData = diferencias.map(p => ({
                lab: p.lab, nombre: p.nombre, precio: p.precio, 
                sistema: p.stockSistema, fisico: parseInt(physicalStockMap[p.id]), dif: parseInt(physicalStockMap[p.id]) - p.stockSistema
            }));

            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Guardando...';
            
            fetch(`${URL_APPS_SCRIPT}?action=save_history`, {
                method: 'POST',
                body: JSON.stringify({ id: idAuditoria, fecha_hora: fechaHoraFormateada, total: diferencias.length, datos: payloadData }),
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }
            })
            .then(res => res.json())
            .then(data => {
                btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> Guardar Reporte';
                generarCSV(payloadData, fechaHoraFormateada);
                alert("¡Éxito! El reporte se guardó en la nube y el Excel se descargó en tu dispositivo.");
            })
            .catch(err => {
                btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> Guardar Reporte';
                alert("Hubo un error guardando en la nube. Revisa tu internet.");
            });
        };
        
        function cargarHistorial() {
            document.getElementById('historial-loader').classList.remove('hidden');
            document.getElementById('historial-list').innerHTML = '';
            
            fetch(`${URL_APPS_SCRIPT}?action=get_history`)
            .then(res => res.json())
            .then(data => {
                document.getElementById('historial-loader').classList.add('hidden');
                historialesGuardados = data;
                renderHistorial(data);
            })
            .catch(err => {
                document.getElementById('historial-loader').classList.add('hidden');
                document.getElementById('historial-list').innerHTML = '<p class="text-red-500 font-bold">Error de conexión al cargar historial.</p>';
            });
        }

        function renderHistorial(historyData) {
            const list = document.getElementById('historial-list');
            if(historyData.length === 0) { list.innerHTML = '<p class="text-gray-500 bg-gray-50 p-4 rounded-xl border border-gray-200 text-center">No hay reportes aún. Cuando hagas un cierre y presiones "Guardar Reporte", aparecerá aquí.</p>'; return; }
            
            historyData.sort((a,b) => b.id - a.id); // Más recientes primero
            
            historyData.forEach(item => {
                const card = document.createElement('div');
                card.className = "flex flex-col md:flex-row justify-between items-center bg-gray-50 p-4 rounded-xl border border-gray-200 hover:border-farmaPurple transition shadow-sm gap-4";
                card.innerHTML = `
                    <div class="flex items-center gap-4 w-full md:w-auto">
                        <div class="bg-purple-100 text-farmaPurple p-4 rounded-full"><i class="fa-solid fa-file-excel text-2xl"></i></div>
                        <div>
                            <h4 class="font-bold text-gray-800 text-lg">Reporte del ${item.fecha_hora}</h4>
                            <p class="text-sm text-gray-500"><i class="fa-solid fa-boxes-stacked mr-1"></i> ${item.total} productos con diferencia</p>
                        </div>
                    </div>
                    <button onclick="descargarDesdeHistorial('${item.id}')" class="w-full md:w-auto bg-farmaGreen hover:bg-green-600 text-white px-5 py-3 rounded-xl font-bold shadow-sm transition flex items-center justify-center gap-2">
                        <i class="fa-solid fa-download"></i> Bajar CSV
                    </button>
                `;
                list.appendChild(card);
            });
        }

        window.descargarDesdeHistorial = function(id) {
            const reporte = historialesGuardados.find(h => h.id == id);
            if(reporte) generarCSV(JSON.parse(reporte.datos), reporte.fecha_hora);
        }

function generarCSV(datosArray, fechaHoraStr) {
            // CAMBIO CLAVE: Usamos punto y coma (;) en vez de coma (,) para que Excel lo abra perfecto
            let csvContent = "Laboratorio;Producto;Precio CLP;Stock Sistema;Stock Fisico;Diferencia\n";
            datosArray.forEach(p => {
                let nombreLimpio = p.nombre.replace(/"/g, '""');
                csvContent += `"${p.lab}";"${nombreLimpio}";${p.precio};${p.sistema};${p.fisico};${p.dif}\n`;
            });
            
            const fechaLimpia = fechaHoraStr.replace(/[\/\s:]/g, '-');
            const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            if (link.download !== undefined) {
                const url = URL.createObjectURL(blob);
                link.setAttribute("href", url);
                link.setAttribute("download", `Dif_FarmaSalud_${fechaLimpia}.csv`);
                link.style.visibility = 'hidden'; 
                document.body.appendChild(link);
                link.click(); 
                document.body.removeChild(link);
            }
        }

        window.resetInventarioNube = function() {
            if(confirm("¿Seguro de BORRAR TODOS los conteos diarios? Se iniciará un conteo desde cero. (Tus historiales de reportes ya guardados NO se borrarán).")) {
                fetch(`${URL_APPS_SCRIPT}?action=reset`).then(() => { physicalStockMap = {}; currentPage = 1; applyFilters(); alert("Inventario limpio."); });
            }
        };
    </script>
</body>
</html>
