<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inventario Cloud | FarmaSalud</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <script>
        tailwind.config = { theme: { extend: { colors: { farmaGreen: '#8DC63F', farmaPurple: '#752888', farmaDarkPurple: '#561c65' } } } }
    </script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; overflow-x: hidden; touch-action: pan-y; background-color: #f3f4f6; }
        input[type="number"] { font-size: 16px; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .loader { border: 4px solid #e5e7eb; border-top: 4px solid #752888; border-radius: 50%; width: 25px; height: 25px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .texto-ajustable { word-wrap: break-word; overflow-wrap: break-word; white-space: normal; }
    </style>
</head>
<body class="flex flex-col min-h-screen pb-20">

    <header class="bg-farmaPurple shadow-md sticky top-0 z-50 text-white">
        <div class="px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-cloud text-2xl text-farmaGreen"></i>
                <div class="leading-none">
                    <h1 class="text-xl font-bold">Inventario Nube</h1>
                    <span class="text-xs text-farmaGreen font-semibold">FarmaSalud Contulmo</span>
                </div>
            </div>
            <button onclick="resetInventarioNube()" class="text-xs bg-red-500 hover:bg-red-600 px-2 py-1 rounded text-white font-bold">
                <i class="fa-solid fa-rotate-left"></i> Limpiar
            </button>
        </div>
        
        <div class="bg-farmaDarkPurple px-4 py-3">
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-gray-400"></i>
                <input type="text" id="searchInput" class="w-full py-2 pl-10 pr-4 rounded-lg text-gray-800 outline-none font-medium" placeholder="Escribe para contar..." autocomplete="off" disabled>
            </div>
            
            <div class="flex gap-2 mt-3 overflow-x-auto pb-1">
                <button onclick="setFilter('todos')" id="btn-todos" class="filter-btn bg-farmaGreen text-white px-3 py-1 rounded-full text-xs font-bold whitespace-nowrap">Todos</button>
                <button onclick="setFilter('diferencias')" id="btn-diferencias" class="filter-btn bg-white/20 text-white px-3 py-1 rounded-full text-xs font-bold whitespace-nowrap">Con Diferencia</button>
                <button onclick="setFilter('pendientes')" id="btn-pendientes" class="filter-btn bg-white/20 text-white px-3 py-1 rounded-full text-xs font-bold whitespace-nowrap">Sin Contar</button>
            </div>
        </div>
    </header>

    <main class="flex-grow w-full px-2 sm:px-4 py-4">
        <div id="statusContainer" class="flex items-center gap-3 justify-center text-gray-500 my-10">
            <div class="loader"></div>
            <span class="font-semibold text-sm">Descargando Maestro y Nube...</span>
        </div>

        <div class="text-xs text-gray-500 font-bold mb-3 px-2" id="resultsCount"></div>
        <div id="productsGrid" class="flex flex-col gap-3"></div>
    </main>

    <script>
        // ==========================================
        // 1. TU ENLACE CSV DEL MAESTRO (El mismo de antes)
        const URL_CSV_MAESTRO = "https://docs.google.com/spreadsheets/d/1GjVV8vuErPNmOIVkP-pk6VPiTrlf4IQby2v-OS0J3Zg/export?format=csv&gid=1307499139";
        
        // 2. TU NUEVA URL DE APPS SCRIPT (Cópiala del Paso 2)
        const URL_APPS_SCRIPT = "https://script.google.com/macros/s/AKfycbxzR2WbNUe4-PB6pZOI5hZTPaX8YouVrAabWnVGQ5CypPjB_EgwbF_QwoFYCNYOnAjgeg/exec";
        // ==========================================

        let allProducts = [];
        let filteredProducts = [];
        let physicalStockMap = {}; 
        let currentFilter = 'todos';
        let debounceTimers = {};

        const clpFmt = new Intl.NumberFormat('es-CL', { style: 'currency', currency: 'CLP', minimumFractionDigits: 0 });

        window.onload = () => {
            document.getElementById('searchInput').addEventListener('input', applyFilters);

            // Descargar Maestro y Stock Físico al mismo tiempo
            const fetchCSV = new Promise((resolve) => {
                Papa.parse(URL_CSV_MAESTRO, { download: true, header: false, complete: res => resolve(res.data) });
            });
            const fetchNube = fetch(`${URL_APPS_SCRIPT}?action=get`).then(res => res.json()).catch(() => ({}));

            Promise.all([fetchCSV, fetchNube]).then(values => {
                physicalStockMap = values[1];
                procesarDatosMaestro(values[0]);
            });
        };

        function procesarDatosMaestro(rawData) {
            let tempProducts = [];
            let headerRowIndex = 5; 
            
            for (let i = 0; i < Math.min(20, rawData.length); i++) {
                if (rawData[i].includes("LAB") && rawData[i].includes("DETALLE")) { headerRowIndex = i; break; }
            }

            for (let i = headerRowIndex + 1; i < rawData.length; i++) {
                const row = rawData[i];
                if (!row || row.length < 8) continue;

                let precioStr = typeof row[7] === 'string' ? row[7].replace(/[^0-9]/g, '') : row[7];
                if (row[4] && precioStr && !isNaN(parseInt(precioStr))) {
                    tempProducts.push({
                        id: btoa(unescape(encodeURIComponent(String(row[4]).trim()))).substring(0, 20),
                        lab: row[0] || 'S/L',
                        nombre: String(row[4]).trim(),
                        precio: parseInt(precioStr),
                        stockSistema: parseInt(row[10]) || 0
                    });
                }
            }

            allProducts = tempProducts;
            document.getElementById('statusContainer').style.display = 'none';
            document.getElementById('searchInput').disabled = false;
            applyFilters();
        }

        function setFilter(type) {
            currentFilter = type;
            document.querySelectorAll('.filter-btn').forEach(btn => { btn.classList.remove('bg-farmaGreen'); btn.classList.add('bg-white/20'); });
            document.getElementById(`btn-${type}`).classList.remove('bg-white/20'); document.getElementById(`btn-${type}`).classList.add('bg-farmaGreen');
            applyFilters();
        }

        function applyFilters() {
            const terms = document.getElementById('searchInput').value.toLowerCase().trim().split(' ');

            filteredProducts = allProducts.filter(p => {
                const searchable = `${p.nombre} ${p.lab}`.toLowerCase();
                if(!terms.every(t => searchable.includes(t))) return false;

                const fisico = physicalStockMap[p.id];
                if (currentFilter === 'diferencias') return fisico !== undefined && parseInt(fisico) !== p.stockSistema;
                if (currentFilter === 'pendientes') return fisico === undefined || fisico === "";
                return true; 
            });

            renderProducts(filteredProducts.slice(0, 40)); // Rendimiento Móvil
        }

        function renderProducts(items) {
            const grid = document.getElementById('productsGrid');
            document.getElementById('resultsCount').innerHTML = `Mostrando ${items.length} de ${filteredProducts.length} (Usa el buscador para afinar)`;
            grid.innerHTML = items.length === 0 ? `<div class="text-center py-10 text-gray-400"><i class="fa-solid fa-box-open text-3xl mb-2"></i><p>Nada por aquí.</p></div>` : '';

            items.forEach(item => {
                let fisicoVal = physicalStockMap[item.id] !== undefined ? physicalStockMap[item.id] : "";
                
                const card = document.createElement('div');
                card.className = `bg-white rounded-xl p-3 shadow-sm border-l-4 ${fisicoVal !== "" ? 'border-farmaGreen' : 'border-gray-200'} relative`;
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <div class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">${item.lab}</div>
                        <i id="cloud_${item.id}" class="fa-solid fa-cloud text-gray-200 text-sm" title="Estado de guardado"></i>
                    </div>
                    <h3 class="text-sm font-bold text-gray-800 mb-4 leading-tight texto-ajustable">${item.nombre}</h3>
                    
                    <div class="flex items-center justify-between bg-gray-50 rounded-lg p-2 border border-gray-100">
                        <div class="text-center flex-1">
                            <span class="block text-[10px] text-gray-500 uppercase font-bold">Sistema</span>
                            <span class="text-lg font-black text-gray-700">${item.stockSistema}</span>
                        </div>
                        <div class="w-px h-8 bg-gray-200 mx-1"></div>
                        <div class="text-center flex-1">
                            <span class="block text-[10px] text-farmaPurple uppercase font-bold">Físico</span>
                            <input type="number" value="${fisicoVal}" oninput="handleStockInput('${item.id}', ${item.stockSistema}, this.value)"
                                class="w-16 h-8 mt-1 text-center font-bold text-lg border-2 border-farmaPurple rounded focus:ring-2 focus:ring-farmaGreen outline-none">
                        </div>
                        <div class="w-px h-8 bg-gray-200 mx-1"></div>
                        <div class="text-center flex-1">
                            <span class="block text-[10px] text-gray-500 uppercase font-bold">Dif.</span>
                            <div id="diff_${item.id}" class="mt-1 px-2 py-0.5 rounded text-sm font-black">-</div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
                actualizarVisualDiferencia(item.id, item.stockSistema, fisicoVal); // Forzar cálculo de color
            });
        }

        window.handleStockInput = function(id, stockSistema, val) {
            actualizarVisualDiferencia(id, stockSistema, val);
            
            // Actualizar memoria RAM para navegación rápida
            if(val === "") delete physicalStockMap[id];
            else physicalStockMap[id] = parseInt(val);

            // Ícono amarillo: Guardando...
            document.getElementById('cloud_' + id).className = "fa-solid fa-cloud text-yellow-400 text-sm";

            // Enviar a la nube (con retraso de 800ms para no enviar datos mientras sigues tecleando)
            if (debounceTimers[id]) clearTimeout(debounceTimers[id]);
            debounceTimers[id] = setTimeout(() => {
                fetch(`${URL_APPS_SCRIPT}?action=update&id=${encodeURIComponent(id)}&qty=${val}`)
                .then(() => {
                    document.getElementById('cloud_' + id).className = "fa-solid fa-cloud text-farmaGreen text-sm"; // Verde: Guardado
                })
                .catch(() => {
                    document.getElementById('cloud_' + id).className = "fa-solid fa-cloud text-red-500 text-sm"; // Rojo: Error de internet
                });
            }, 800);
        };

        function actualizarVisualDiferencia(id, stockSistema, val) {
            let dEl = document.getElementById('diff_' + id);
            if(!dEl) return;
            if (val === "") { dEl.innerHTML = "-"; dEl.className = "mt-1 px-2 py-0.5 rounded text-sm font-black text-gray-400"; return; }
            let dif = parseInt(val) - stockSistema;
            if (dif === 0) { dEl.innerHTML = "<i class='fa-solid fa-check'></i>"; dEl.className = "mt-1 px-2 py-0.5 rounded text-sm font-black text-green-600 bg-green-100"; }
            else if (dif > 0) { dEl.innerHTML = "+" + dif; dEl.className = "mt-1 px-2 py-0.5 rounded text-sm font-black text-blue-600 bg-blue-100"; }
            else { dEl.innerHTML = dif; dEl.className = "mt-1 px-2 py-0.5 rounded text-sm font-black text-red-600 bg-red-100"; }
        }

        window.resetInventarioNube = function() {
            if(confirm("¿Estás seguro? Esto borrará TODO el inventario físico guardado en la nube para todos los dispositivos.")) {
                fetch(`${URL_APPS_SCRIPT}?action=reset`)
                .then(() => { physicalStockMap = {}; applyFilters(); alert("Base de datos en la nube limpiada."); });
            }
        };
    </script>
</body>
</html>
